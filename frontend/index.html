<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Modern & Elegant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>✨ My Tasks</h1>
                <p class="subtitle">Stay organized, stay productive</p>
            </div>
        </header>

        <!-- Summary Cards Section -->
        <div class="summary-section">
            <div class="summary-card total-card">
                <div class="card-icon">📊</div>
                <div class="card-content">
                    <div class="card-value" id="totalCount">0</div>
                    <div class="card-label">Total Tasks</div>
                </div>
            </div>
            
            <div class="summary-card active-card">
                <div class="card-icon">🎯</div>
                <div class="card-content">
                    <div class="card-value" id="activeCount">0</div>
                    <div class="card-label">Active</div>
                </div>
            </div>
            
            <div class="summary-card completed-card">
                <div class="card-icon">✅</div>
                <div class="card-content">
                    <div class="card-value" id="completedCount">0</div>
                    <div class="card-label">Completed</div>
                </div>
            </div>
        </div>

        <!-- Add Todo Section -->
        <div class="todo-input-section">
            <div class="input-header">
                <h2>➕ Add New Task</h2>
            </div>
            <input 
                type="text" 
                id="todoTitle" 
                placeholder="What needs to be done?" 
                maxlength="200"
            >
            <textarea 
                id="todoDescription" 
                placeholder="Add details (optional)..." 
                rows="3"
            ></textarea>
            <button id="addTodoBtn" class="btn btn-primary">
                <span class="btn-icon">+</span>
                Add Task
            </button>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">
                <span class="filter-icon">📋</span> All
            </button>
            <button class="filter-btn" data-filter="active">
                <span class="filter-icon">⏳</span> Active
            </button>
            <button class="filter-btn" data-filter="completed">
                <span class="filter-icon">✓</span> Completed
            </button>
        </div>

        <!-- Todo List -->
        <div id="todoList" class="todo-list">
            <!-- Todos will be dynamically added here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
